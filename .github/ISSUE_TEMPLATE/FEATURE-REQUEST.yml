name: Feature Request
description: Request a new feature.
title: "[Feature Request]: "
labels: ["feature"]
assignees:
  - ggjorven
type: feature
body:
  - type: textarea
    id: feature-request
    attributes:
      label: Requested feature
      description: New feature description.
      placeholder: Tell us your amazing idea!
      value: "My amazing feature idea is ...!"
    validations:
      required: true
  - type: textarea
    id: issues
    attributes:
      label: Relevant issues
      description: Any issues that could be solved with this feature
  - type: textarea
    id: implementation
    attributes:
      label: How to implement
      description: If applicable, how to implement this feature.
    validations:
      required: false
